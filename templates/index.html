<!DOCTYPE html>
<html>
<head>
    <title>Scheduling Algorithms</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Scheduling Algorithms Simulator</h1>

    <label>Algorithm:</label>
    <select id="algorithm">
        <option value="fcfs">FCFS</option>
        <option value="sjf">SJF</option>
        <option value="sjf_preemptive">SJF Preemptive</option>
        <option value="priority_non_preemptive">Priority Non-Preemptive</option>
        <option value="priority_preemptive">Priority Preemptive</option>
        <option value="round_robin">Round Robin</option>
        <option value="priority_round_robin">Priority Round Robin</option>
    </select>

    <br><br>

    <textarea id="processes" rows="10" cols="50">
[
  {"pid": "P1", "arrival_time": 0, "burst_time": 5, "priority": 2},
  {"pid": "P2", "arrival_time": 1, "burst_time": 3, "priority": 1}
]
    </textarea>

    <br><br>

    <label>Quantum (optional):</label>
    <input id="quantum" type="number" value="2">

    <br><br>

    <button onclick="runSimulation()">Run</button>

    <!--<pre id="output"></pre>-->

    <h2>Gantt Chart</h2>
    <canvas id="ganttChart" width="900" height="80"></canvas>

    <script>
        let chart = null;

        async function runSimulation() {
            const algorithm = document.getElementById("algorithm").value;
            const processes = JSON.parse(document.getElementById("processes").value);
            const quantum = document.getElementById("quantum").value;

            let url = `/${algorithm}`;
            let body = processes;

            if (algorithm.includes("round_robin")) {
                url += `?quantum=${quantum}`;
            }

            const response = await fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            });

            const result = await response.json();
            //document.getElementById("output").textContent = JSON.stringify(result, null, 2);

            drawGantt(result.gantt);
        }

        function drawGantt(ganttData) {
            const ctx = document.getElementById("ganttChart").getContext("2d");

            if (chart) {
                chart.destroy();
            }

            const maxFinish = Math.max(...ganttData.map(item => item.finish));

            // Pregătim datele ca intervale [start, finish]
            const data = ganttData.map(item => ({
                x: [item.start, item.finish],
                y: "Timeline",
                label: item.process
            }));

            // Culori consistente per proces
            const colors = {};
            ganttData.forEach(item => {
                if (!colors[item.process]) {
                    colors[item.process] = "#" + Math.floor(Math.random()*16777215).toString(16);
                }
            });

            // Plugin pentru text în interiorul barelor
            const labelPlugin = {
                id: "labelPlugin",
                afterDatasetsDraw(chart) {
                    const { ctx } = chart;

                    chart.data.datasets[0].data.forEach((bar, index) => {
                        const meta = chart.getDatasetMeta(0).data[index];

                        // coordonatele reale ale barei
                        const start = bar.x[0];
                        const finish = bar.x[1];
                        const centerX = chart.scales.x.getPixelForValue((start + finish) / 2);
                        const centerY = meta.y;

                        ctx.save();
                        ctx.fillStyle = "white";
                        ctx.font = "bold 14px Arial";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(bar.label, centerX, centerY);
                        ctx.restore();
                    });
                }
            };

            chart = new Chart(ctx, {
            type: "bar",
                data: {
                    datasets: [{
                        label: "Execution",
                        data: data,
                        backgroundColor: data.map(d => colors[d.label]),
                        borderColor: "black",
                        borderWidth: 1,
                        barPercentage: 1.0,
                        categoryPercentage: 1.0,
                        barThickness: 30
                    }]
                },
                options: {
                    indexAxis: "y",
                    parsing: {
                        xAxisKey: 'x',
                        yAxisKey: 'y'
                    },
                    scales: {
                        y: {
                            type: "category",
                            labels: ["Timeline"],
                            grid: { display: false },
                            offset: true //elimină spațiul dintre bare
                        },
                        x: {
                            type: "linear",
                            beginAtZero: true,
                            max: maxFinish,
                            ticks: {
                                stepSize: 1,
                                callback: v => Number.isInteger(v) ? v : ""
                            },
                            title: { display: true, text: "Time" }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                },
                plugins: [labelPlugin]
            });
        }
    </script>
</body>
</html>
