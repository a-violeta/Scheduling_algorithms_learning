{% raw %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Exerciții Scheduling</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h1>Exercițiu de Scheduling</h1>

<div id="exercise-container" data-exercise-id="{{ exercise_id }}">
    <p id="ex-description"></p>
    <small id="ex-title"></small>

    <h3>Procese</h3>
    <table border="1">
        <thead>
            <tr>
                <th>PID</th>
                <th>Arrival</th>
                <th>Burst</th>
                <th>Priority</th>
            </tr>
        </thead>
        <tbody id="process-table"></tbody>
    </table>

    <h3>Răspunsul tău</h3>
    <input id="user-answer" type="number" step="0.01">
    <button onclick="checkAnswer()">Verifică</button>

    <p id="feedback"></p>

    <div id="ganttContainer" style="display:none;">
        <h2>Gantt Chart</h2>
        <canvas id="ganttChart" width="900" height="80"></canvas>
    </div>

</div>

<script src="/static/js/exercise.js"></script>
</body>
</html>
{% endraw %}
